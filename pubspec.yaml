name: siriussafe
description: "Aplicativo de segurança SiriusSafe"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  shared_preferences: 2.2.2
  geolocator: 11.0.0
  telephony: 0.2.0
  url_launcher: 6.2.5
  lucide_icons: 0.257.0
  path_provider: 2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.0
  flutter_launcher_icons: 0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/icon.png"